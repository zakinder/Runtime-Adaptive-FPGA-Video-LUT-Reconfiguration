name: Markdown Check

on:
  push:
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-check.yml'
  pull_request:
    paths:
      - '**/*.md'
      - '.github/workflows/markdown-check.yml'

jobs:
  markdown-check:
    name: Check Markdown Files
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List Markdown files
        run: |
          echo "Markdown files in repository:"
          find . -name "*.md" -type f | sort

      - name: Basic Markdown sanity check
        run: |
          set -e
          echo "Checking for empty Markdown files..."
          empty_files=$(find . -name "*.md" -type f -size 0)
          if [ -n "$empty_files" ]; then
            echo "Empty Markdown files found:"
            echo "$empty_files"
            exit 1
          fi
          echo "No empty Markdown files found."

      - name: Check README exists
        run: |
          test -f README.md
          echo "README.md exists."
